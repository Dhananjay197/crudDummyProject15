<mat-toolbar>
    <span>CRUD Dashboard</span>
    <span class="example-spacer"></span>
  
    <button mat-raised-button color="warn" (click)="openDialog()" style="margin-right: 10px;">Add User</button>
    <button mat-raised-button color="warn" (click)="logout()" >Log Out</button>
  </mat-toolbar>
  
  <div class="container">
    <div style="margin-top: 10px;">
      <mat-form-field>
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
      </mat-form-field>
      <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>
  
          <!-- ID Column -->
          <ng-container matColumnDef="productName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Product Name</th>
            <td mat-cell *matCellDef="let row"> {{row.productName}} </td>
          </ng-container>
  
          <!-- Progress Column -->
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Category </th>
            <td mat-cell *matCellDef="let row"> {{row.category}}</td>
          </ng-container>
  
          <!-- Name Column -->
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Choose a date </th>
            <td mat-cell *matCellDef="let row"> {{row.date}} </td>
          </ng-container>
  
          <!-- Fruit Column -->
          <ng-container matColumnDef="freshness">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Freshness </th>
            <td mat-cell *matCellDef="let row"> {{row.freshness}} </td>
          </ng-container>
  
  
          <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
            <td mat-cell *matCellDef="let row"> {{row.price}} </td>
          </ng-container>
          <ng-container matColumnDef="comment">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Comment</th>
            <td mat-cell *matCellDef="let row"> {{row.comment}} </td>
          </ng-container>
  
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Action</th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button color="primary" (click)="editProduct(row)">
                <mat-icon>edit</mat-icon>
              </button>
          
            <button mat-icon-button color="warn" (click)="deleteProduct(row.id)">
              <mat-icon>delete</mat-icon>
            </button>
            <!-- <mat-checkbox (change)="checkBox($event,row)" id={{row.id}} [checked]="toggleCheckBox(row.id)"></mat-checkbox> -->
          </td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
          <!-- Row shown when there is no matching data. -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
          </tr>
        </table>
  
        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
      </div>
    </div>
    <button *ngIf="selectedColleges.length >1"  (click)="merge()" id="save"  class="btn1" style="margin: 1.0% 0;width:8%">Merge</button>

  </div>
